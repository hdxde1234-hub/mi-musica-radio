name: Auto DJ Inmortal gratis 24/7

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *' # Se activa solito cada 3 horas para que la radio nunca muera

jobs:
  transmitir:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Clonar el repositorio
      uses: actions/checkout@v4

    - name: 🐧 Instalar Liquidsoap
      run: |
        sudo apt-get update
        sudo apt-get install -y liquidsoap

    - name: 🎶 ¡Prender la radio y transmitir!
      env:
        STREAM_HOST: ${{ secrets.STREAM_HOST }}
        STREAM_PORT: ${{ secrets.STREAM_PORT }}
        STREAM_PASSWORD: ${{ secrets.STREAM_PASSWORD }}
        STREAM_MOUNT: ${{ secrets.STREAM_MOUNT }}
      run: |
        liquidsoap /home/runner/work/mi-musica-radio/mi-musica-radio/radio.liq
